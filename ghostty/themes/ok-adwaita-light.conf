# Adwaita Lighter Theme for Ghostty
# Migrated from Kitty ok-adwaita-light.conf
# Based on https://github.com/Mofiqul/adwaita.nvim

# Basic Colors
background = #f1f1f1
foreground = #1c1c1c

# Selection Colors
selection-background = #d0cfcc
selection-foreground = #000000

# Cursor Colors
cursor-color = #1c1c1c
cursor-text = #f1f1f1

# ANSI Colors (0-7: Normal, 8-15: Bright)
# Black
palette = 0=#3d3846
palette = 8=#5e5c64

# Red
palette = 1=#c01c28
palette = 9=#ed333b

# Green
palette = 2=#26a269
palette = 10=#33d17a

# Yellow
palette = 3=#a2734c
palette = 11=#e5a50a

# Blue
palette = 4=#1a5fb4
palette = 12=#3584e4

# Magenta/Purple
palette = 5=#7e3ba0
palette = 13=#a347ba

# Cyan
palette = 6=#2aa798
palette = 14=#4fb8a6

# White
palette = 7=#deddda
palette = 15=#ffffff
