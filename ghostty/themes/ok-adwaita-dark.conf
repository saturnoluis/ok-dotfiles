# Adwaita Darker Theme for Ghostty
# Migrated from Kitty ok-adwaita-dark.conf
# Based on https://github.com/Mofiqul/adwaita.nvim

# Basic Colors
background = #000000
foreground = #deddda

# Selection Colors
selection-background = #1c1c1c
selection-foreground = #c0bfbc

# Cursor Colors
cursor-color = #deddda
cursor-text = #000000

# ANSI Colors (0-7: Normal, 8-15: Bright)
# Black
palette = 0=#000000
palette = 8=#9a9996

# Red
palette = 1=#ed333b
palette = 9=#f66151

# Green
palette = 2=#57e389
palette = 10=#8ff0a4

# Yellow/Orange
palette = 3=#ff7800
palette = 11=#ffa348

# Blue
palette = 4=#62a0ea
palette = 12=#99c1f1

# Magenta/Purple
palette = 5=#9141ac
palette = 13=#dc8add

# Cyan
palette = 6=#5bc8af
palette = 14=#93ddc2

# White
palette = 7=#deddda
palette = 15=#f6f5f4
